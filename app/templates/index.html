<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe RAG Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="messages" class="messages" aria-live="polite">
        <article class="msg bot welcome"><p>Share ingredients or your cooking goal.</p></article>
      </section>

      <form id="chat-form" class="composer">
        <div id="imagePreviewContainer" class="image-preview-container" style="display: none;">
          <img id="imagePreview" alt="Preview" />
          <button type="button" id="removeImageBtn" class="remove-image-btn" aria-label="Remove image">&times;</button>
        </div>
        <div class="composer-controls">
          <div class="input-wrapper">
            <input type="file" id="imageInput" accept="image/*" class="sr-only" />
            <label for="imageInput" class="attach-btn" id="imageLabel" title="Upload Image">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
            </label>
            <label for="message" class="sr-only">Your message</label>
            <textarea
              id="message"
              name="message"
              rows="1"
              placeholder="Ask anything..."
              required
            ></textarea>
          </div>
          <button id="send" type="submit">Send</button>
          <button id="new-chat-btn" type="button" aria-label="Start a new chat">New Chat</button>
        </div>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
